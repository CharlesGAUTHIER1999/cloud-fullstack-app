version: "3.8"

services:
  db:
    image: mysql:8.4
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: appcloud_local
      MYSQL_USER: appcloud_user
      MYSQL_PASSWORD: appcloud_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uappcloud_user", "-pappcloud_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: laravel_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      APP_NAME: AppCloud
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:PLACE_YOUR_LOCAL_KEY_HERE
      APP_URL: http://localhost:8000

      LOG_CHANNEL: stack
      LOG_LEVEL: debug

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: appcloud_local
      DB_USERNAME: appcloud_user
      DB_PASSWORD: appcloud_password

      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      SESSION_LIFETIME: 120
    user: "0:0"

  frontend:
    build:
      context: ./frontend
    container_name: react_app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    environment:
      CHOKIDAR_USE_POLLING: "true"
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend

volumes:
  db_data: