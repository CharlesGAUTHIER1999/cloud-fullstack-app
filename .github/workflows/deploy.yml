name: Deploy Appcloud

on:
  push:
    branches: ["main"]

jobs:
  deploy-backend:
    name: Deploy Backend (Laravel) to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1️⃣ Setup Google Cloud SDK
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ynovtestv2
          service_account_key: ${{ secrets.GCP_SA_KEY_BASE64 }}

      # 2️⃣ Configure Docker auth for Artifact Registry
      - name: Configure Docker auth
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      # 3️⃣ Build & Push Docker image
      - name: Build and Push Docker image
        run: |
          cd backend
          docker build -t europe-west1-docker.pkg.dev/ynovtestv2/appcloud-repo/backend:latest .
          docker push europe-west1-docker.pkg.dev/ynovtestv2/appcloud-repo/backend:latest

      # 4️⃣ Deploy to Cloud Run
      - name: Deploy Laravel API to Cloud Run
        run: |
          gcloud run deploy appcloud-backend \
            --image europe-west1-docker.pkg.dev/ynovtestv2/appcloud-repo/backend:latest \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --project ynovtestv2

  deploy-frontend:
    name: Deploy Frontend (React) to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build project
        working-directory: ./frontend
        run: npm run build

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel --token $VERCEL_TOKEN --prod --yes \
            --scope $VERCEL_ORG_ID \
            --name cloud-fullstack-app
