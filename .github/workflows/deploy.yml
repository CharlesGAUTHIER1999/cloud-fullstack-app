name: Deploy AppCloud
on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend (Laravel) to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo, pdo_pgsql, zip, gd
          coverage: none

      - name: Install backend dependencies
        run: |
          cd backend
          composer install --no-interaction

      - name: Prepare Laravel environment for tests
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing

      - name: Run Laravel tests
        run: |
          cd backend
          php artisan test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and Push Docker image
        run: |
          docker build -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/appcloud-repo/backend:latest ./backend
          docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/appcloud-repo/backend:latest

      - name: Deploy Laravel API to Cloud Run
        run: |
          gcloud run deploy appcloud-backend \
            --image europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/appcloud-repo/backend:latest \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --add-cloudsql-instances projetdemocloudgauthier:europe-west1:appcloudgauthier \
            --set-env-vars APP_NAME=AppCloud \
            --set-env-vars APP_ENV=production \
            --set-env-vars APP_DEBUG=false \
            --set-env-vars APP_URL=${{ secrets.APP_URL }} \
            --set-env-vars LOG_CHANNEL=stack \
            --set-env-vars LOG_LEVEL=info \
            --set-env-vars DB_CONNECTION=mysql \
            --set-env-vars DB_HOST=127.0.0.1 \
            --set-env-vars DB_SOCKET=/cloudsql/projetdemocloudgauthier:europe-west1:appcloudgauthier \
            --set-env-vars DB_PORT=3306 \
            --set-env-vars DB_DATABASE=${{ secrets.DB_DATABASE }} \
            --set-env-vars DB_USERNAME=${{ secrets.DB_USERNAME }} \
            --set-env-vars DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --set-env-vars CACHE_STORE=file \
            --set-env-vars QUEUE_CONNECTION=sync \
            --set-env-vars SESSION_DRIVER=file \
            --set-env-vars SESSION_LIFETIME=120 \
            --set-env-vars APP_KEY=${{ secrets.APP_KEY }} \
            --project ${{ secrets.GCP_PROJECT_ID }}